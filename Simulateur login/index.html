<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulateur de connexion utilisateur</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="wrapper">
      <p>Connectez-vous</p>
      <div id="main">
        <label for="email">Email</label>
        <div id="champ" class="input-email">
          <div class="icon"><ion-icon name="mail-outline"></ion-icon></div>
          <input
            type="email"
            name=""
            id="email"
            placeholder="fleury@gmail.com"
          />
        </div>
      </div>

      <div id="main">
        <label for="password">Password</label>
        <div id="champ" class="input-password">
          <div class="icon">
            <ion-icon name="lock-closed-outline"></ion-icon>
          </div>
          <input
            type="password"
            name=""
            id="password"
            placeholder="..........."
          />
        </div>
      </div>

      <button>CONNEXION</button>
    </div>
    <script
      type="module"
      src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"
    ></script>
    <script src="app.js"></script>
  </body>
</html>
